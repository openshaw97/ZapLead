<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log In — LeadHarvest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c10;--surface:#0f1318;--surface2:#161c24;--border:#1e2730;--border2:#2a3540;--green:#00e5a0;--green-dim:#00c488;--text:#e8edf2;--muted:#5a6875;--muted2:#8a97a4;--red:#ff4d6a}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text);text-decoration:none}
.nav-logo span{color:var(--green)}
.nav-link{color:var(--muted2);text-decoration:none;font-size:0.88rem}
.nav-link:hover{color:var(--text)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.auth-box{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:40px;width:100%;max-width:420px}
.auth-logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--text);text-align:center;margin-bottom:4px}
.auth-logo span{color:var(--green)}
.auth-sub{text-align:center;font-size:0.85rem;color:var(--muted2);margin-bottom:32px}
.field{margin-bottom:16px}
label{display:block;font-size:0.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600}
input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:0.95rem;padding:12px 14px;outline:none;transition:border-color 0.2s}
input:focus{border-color:var(--green)}
input::placeholder{color:var(--muted)}
.btn{width:100%;background:var(--green);color:var(--bg);font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;padding:13px;border:none;border-radius:8px;cursor:pointer;margin-top:8px;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--green-dim)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.error{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.3);border-radius:6px;padding:10px 14px;font-size:0.85rem;color:var(--red);margin-bottom:16px;display:none}
.error.show{display:block}
.divider{text-align:center;font-size:0.8rem;color:var(--muted);margin:20px 0}
.switch-link{text-align:center;font-size:0.85rem;color:var(--muted2);margin-top:20px}
.switch-link a{color:var(--green);text-decoration:none;font-weight:500}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:var(--bg);border-radius:50%;animation:spin 0.7s linear infinite;display:none}
.loading .spinner{display:block}
.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Lead<span>Harvest</span></a>
  <a href="/register" class="nav-link">No account? Sign up free →</a>
</nav>
<div class="main">
  <div class="auth-box">
    <div class="auth-logo">Lead<span>Harvest</span></div>
    <div class="auth-sub">Welcome back — log in to your account</div>
    <div class="error" id="err"></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com" autofocus/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Your password"/></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">
      <div class="spinner"></div><span class="btn-text">Log In →</span>
    </button>
    <div class="switch-link">Don't have an account? <a href="/register">Sign up free</a></div>
  </div>
</div>
<script>
const token = localStorage.getItem('lh_token');
if (token) {
  fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })
    .then(r => { if (r.ok) window.location.href = '/app'; })
    .catch(() => {});
}
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showErr('Please enter your email and password'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.classList.add('loading');
  hideErr();
  try {
    const r = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    localStorage.setItem('lh_token', d.token);
    window.location.href = '/app';
  } catch(e) {
    showErr(e.message);
    btn.disabled = false; btn.classList.remove('loading');
  }
}
function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.classList.add('show'); }
function hideErr() { document.getElementById('err').classList.remove('show'); }
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
