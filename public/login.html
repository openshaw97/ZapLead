<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log In — LeadHarvest</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080d;--s1:#0b0f16;--s2:#111620;--b1:#1a2030;--b2:#232d40;--green:#22c55e;--green2:#16a34a;--text:#f0f4f8;--t2:#8fa3bf;--t3:#4a5a6e;--red:#ef4444}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(34,197,94,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(34,197,94,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 36px;height:58px;border-bottom:1px solid var(--b1);position:relative;z-index:1}
.logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text);text-decoration:none}
.logo em{color:var(--green);font-style:normal}
.nav-link{color:var(--t2);font-size:0.85rem;text-decoration:none}
.nav-link:hover{color:var(--text)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1}
.box{background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:38px;width:100%;max-width:400px}
.box-logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:4px}
.box-logo em{color:var(--green);font-style:normal}
.box-sub{text-align:center;font-size:0.82rem;color:var(--t2);margin-bottom:28px}
.field{margin-bottom:14px}
label{display:block;font-size:0.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;font-weight:600}
input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:6px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.92rem;padding:11px 14px;outline:none;transition:border-color 0.15s}
input:focus{border-color:var(--green)}
input::placeholder{color:var(--t3)}
.btn{width:100%;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-size:0.98rem;font-weight:800;padding:12px;border:none;border-radius:7px;cursor:pointer;margin-top:6px;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn:hover{background:var(--green2)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:9px 13px;font-size:0.82rem;color:var(--red);margin-bottom:14px;display:none}
.err.show{display:block}
.switch{text-align:center;font-size:0.82rem;color:var(--t2);margin-top:18px}
.switch a{color:var(--green);text-decoration:none;font-weight:500}
.spin{width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
.loading .spin{display:block}.loading .bt{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav><a href="/" class="logo">Lead<em>Harvest</em></a><a href="/register" class="nav-link">No account? Sign up free →</a></nav>
<div class="main">
  <div class="box">
    <div class="box-logo">Lead<em>Harvest</em></div>
    <div class="box-sub">Sign in to your account</div>
    <div class="err" id="err"></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com" autofocus/></div>
    <div class="field"><label>Password</label><input type="password" id="pw" placeholder="Your password"/></div>
    <button class="btn" id="btn" onclick="doLogin()"><div class="spin"></div><span class="bt">Sign In →</span></button>
    <div class="switch">Don't have an account? <a href="/register">Sign up free</a></div>
  </div>
</div>
<script>
// If already logged in, redirect
const t = localStorage.getItem('lh_token');
if (t) fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+t}}).then(r=>{if(r.ok)window.location.href='/app';}).catch(()=>{});
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  if(!email||!pw){showErr('Enter your email and password');return;}
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.classList.add('loading');hideErr();
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error);
    localStorage.setItem('lh_token',d.token);
    window.location.href='/app';
  }catch(e){showErr(e.message);btn.disabled=false;btn.classList.remove('loading');}
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');}
function hideErr(){document.getElementById('err').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
