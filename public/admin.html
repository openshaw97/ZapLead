<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZapLead Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#05080d;--s1:#0b0f16;--s2:#111620;--s3:#181e2a;--b1:#1a2030;--b2:#232d40;--green:#22c55e;--green2:#16a34a;--green-g:rgba(34,197,94,0.1);--text:#f0f4f8;--t2:#8fa3bf;--t3:#4a5a6e;--amber:#f59e0b;--red:#ef4444}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;background:var(--s1);border-bottom:1px solid var(--b1)}
.logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800}
.logo em{color:var(--green);font-style:normal}
.admin-badge{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--amber);font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px}
.page{max-width:1200px;margin:0 auto;padding:32px 20px}
/* LOGIN */
.login-box{max-width:380px;margin:80px auto;background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:36px}
.login-box h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:6px}
.login-box p{font-size:0.82rem;color:var(--t2);margin-bottom:24px}
input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:6px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;padding:10px 14px;outline:none;margin-bottom:12px;transition:border-color 0.15s}
input:focus{border-color:var(--green)}
.btn{width:100%;background:var(--green);color:#000;font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:800;padding:11px;border:none;border-radius:7px;cursor:pointer;transition:background 0.15s}
.btn:hover{background:var(--green2)}
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:9px 13px;font-size:0.82rem;color:var(--red);margin-bottom:12px;display:none}
.err.show{display:block}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:20px}
.stat-n{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--green)}
.stat-l{font-size:0.78rem;color:var(--t3);margin-top:4px}
/* TABLE */
.section-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:10px;overflow:hidden;overflow-x:auto;margin-bottom:28px}
table{width:100%;border-collapse:collapse;min-width:700px}
th{background:var(--s2);padding:10px 16px;text-align:left;font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);font-weight:600;border-bottom:1px solid var(--b1)}
td{padding:12px 16px;border-bottom:1px solid var(--b1);font-size:0.83rem;color:var(--t2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.01)}
.plan-badge{display:inline-flex;padding:2px 10px;border-radius:20px;font-size:0.68rem;font-weight:700;letter-spacing:0.5px}
.plan-free{background:var(--s3);color:var(--t3)}
.plan-starter{background:rgba(59,130,246,0.1);color:#60a5fa;border:1px solid rgba(59,130,246,0.2)}
.plan-pro{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.plan-enterprise{background:rgba(245,158,11,0.1);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}
.plan-sel{background:var(--s3);border:1px solid var(--b2);border-radius:5px;color:var(--text);font-size:0.78rem;padding:4px 8px;cursor:pointer;outline:none}
.plan-sel:focus{border-color:var(--green)}
.user-name{color:var(--text);font-weight:500}
.action-btn{background:var(--s3);border:1px solid var(--b2);color:var(--t2);font-size:0.72rem;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all 0.15s}
.action-btn:hover{border-color:var(--green);color:var(--green)}
.action-btn.danger:hover{border-color:var(--red);color:var(--red)}
.search-input{background:var(--s2);border:1px solid var(--b2);border-radius:6px;color:var(--text);font-size:0.85rem;padding:7px 12px;outline:none;width:240px}
.search-input:focus{border-color:var(--green)}
.refresh-btn{background:var(--s3);border:1px solid var(--b2);color:var(--t2);font-size:0.78rem;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all 0.15s}
.refresh-btn:hover{border-color:var(--green);color:var(--green)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:9px 20px;font-size:0.84rem;font-weight:500;color:var(--text);z-index:999;transition:transform 0.25s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(34,197,94,0.4);color:var(--green)}
</style>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
</head>
<body>
<div class="topbar">
  <div class="logo">Zap<em>Lead</em> <span class="admin-badge">ADMIN</span></div>
  <button class="refresh-btn" onclick="loadUsers()">↻ Refresh</button>
</div>

<div class="page" id="loginPage">
  <div class="login-box">
    <h2>Admin Access</h2>
    <p>Enter your admin secret to continue</p>
    <div class="err" id="loginErr"></div>
    <input type="password" id="secretInput" placeholder="Admin secret"/>
    <button class="btn" onclick="doLogin()">Enter Admin Panel</button>
  </div>
</div>

<div class="page" id="adminPage" style="display:none">
  <!-- STATS -->
  <div class="stats" id="statsRow"></div>

  <!-- USERS TABLE -->
  <div class="section-title">
    All Users
    <div style="display:flex;gap:10px;align-items:center">
      <input type="text" class="search-input" id="userSearch" placeholder="Search by name or email..." oninput="filterUsers()"/>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>User</th><th>Phone</th><th>Plan</th><th>Exports Used</th><th>Saved Leads</th><th>Joined</th><th>Change Plan</th><th>Actions</th>
      </tr></thead>
      <tbody id="usersBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let secret = '';
let allUsers = [];

async function doLogin() {
  secret = document.getElementById('secretInput').value.trim();
  if (!secret) return;
  try {
    const r = await fetch('/api/admin/users', { headers: { 'x-admin-secret': secret } });
    if (!r.ok) { document.getElementById('loginErr').textContent = 'Invalid secret'; document.getElementById('loginErr').classList.add('show'); return; }
    allUsers = await r.json();
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    renderStats();
    renderUsers(allUsers);
  } catch(e) { document.getElementById('loginErr').textContent = e.message; document.getElementById('loginErr').classList.add('show'); }
}

async function loadUsers() {
  if (!secret) return;
  try {
    const r = await fetch('/api/admin/users', { headers: { 'x-admin-secret': secret } });
    allUsers = await r.json();
    renderStats();
    filterUsers();
    toast('Refreshed', true);
  } catch(e) { toast('Error: ' + e.message, false); }
}

function renderStats() {
  const total = allUsers.length;
  const paid = allUsers.filter(u => u.plan !== 'free').length;
  const starter = allUsers.filter(u => u.plan === 'starter').length;
  const pro = allUsers.filter(u => u.plan === 'pro').length;
  const enterprise = allUsers.filter(u => u.plan === 'enterprise').length;
  const mrr = (starter * 29) + (pro * 59) + (enterprise * 149);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total Users</div></div>
    <div class="stat"><div class="stat-n">${paid}</div><div class="stat-l">Paid Users</div></div>
    <div class="stat"><div class="stat-n">£${mrr}</div><div class="stat-l">Monthly Revenue (MRR)</div></div>
    <div class="stat"><div class="stat-n">${starter}</div><div class="stat-l">Starter (£29)</div></div>
    <div class="stat"><div class="stat-n">${pro}</div><div class="stat-l">Pro (£59)</div></div>
    <div class="stat"><div class="stat-n">${enterprise}</div><div class="stat-l">Enterprise (£149)</div></div>
  `;
}

function renderUsers(users) {
  const tbody = document.getElementById('usersBody');
  if (!users.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:28px;color:var(--t3)">No users found</td></tr>'; return; }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>
        <div class="user-name">${esc(u.name)}</div>
        <div style="font-size:0.72rem;color:var(--t3)">${esc(u.email)}</div>
      </td>
      <td style="font-size:0.78rem">${u.phone ? `<a href="tel:${esc(u.phone)}" style="color:var(--green);text-decoration:none">${esc(u.phone)}</a>` : '<span style="color:var(--t3)">—</span>'}</td>
      <td><span class="plan-badge plan-${u.plan}">${u.plan.toUpperCase()}</span></td>
      <td>${u.leadsUsed || 0}</td>
      <td>${u.savedLeads || 0}</td>
      <td style="font-size:0.75rem">${new Date(u.createdAt).toLocaleDateString('en-GB')}</td>
      <td>
        <select class="plan-sel" onchange="changePlan('${u.id}', this.value)">
          <option value="free" ${u.plan==='free'?'selected':''}>Free</option>
          <option value="starter" ${u.plan==='starter'?'selected':''}>Starter £29</option>
          <option value="pro" ${u.plan==='pro'?'selected':''}>Pro £59</option>
          <option value="enterprise" ${u.plan==='enterprise'?'selected':''}>Enterprise £149</option>
        </select>
      </td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="action-btn" onclick="resetCredits('${u.id}')">Reset Credits</button>
        <button class="action-btn danger" onclick="deleteUser('${u.id}', '${esc(u.name)}')">Delete</button>
      </td>
    </tr>
  `).join('');
}

function filterUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  const filtered = q ? allUsers.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)) : allUsers;
  renderUsers(filtered);
}

async function changePlan(userId, plan) {
  try {
    const r = await fetch('/api/admin/set-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
      body: JSON.stringify({ userId, plan })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    const u = allUsers.find(u => u.id === userId);
    if (u) u.plan = plan;
    renderStats();
    toast(`✅ ${u?.name} upgraded to ${plan}`, true);
  } catch(e) { toast('❌ ' + e.message, false); }
}

async function deleteUser(userId, name) {
  if (!confirm(`Delete ${name}? This cannot be undone.`)) return;
  try {
    const r = await fetch('/api/admin/delete-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
      body: JSON.stringify({ userId })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    allUsers = allUsers.filter(u => u.id !== userId);
    renderStats();
    filterUsers();
    toast(`✅ ${name} deleted`, true);
  } catch(e) { toast('❌ ' + e.message, false); }
}

async function resetCredits(userId) {
  try {
    const r = await fetch('/api/admin/reset-credits', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
      body: JSON.stringify({ userId })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error);
    const u = allUsers.find(u => u.id === userId);
    if (u) u.leadsUsed = 0;
    renderUsers(allUsers);
    toast(`✅ Credits reset for ${u?.name}`, true);
  } catch(e) { toast('❌ ' + e.message, false); }
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (ok ? ' ok' : '');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
