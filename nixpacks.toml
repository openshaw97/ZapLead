    <div class="feature-card">
      <div class="feature-icon">🔄</div>
      <h3>Always fresh data</h3>
      <p>Data is fetched live from Google every time you search — not from an old database. You always get current, accurate results.</p>
    </div>
  </div>
</section>

<!-- HOW IT WORKS -->
<section class="how" id="how">
  <div style="max-width:800px;margin:0 auto">
    <div class="section-label" style="text-align:left">How it works</div>
    <h2 class="section-title" style="text-align:left;margin-bottom:40px">Three steps to<br/>your next customer</h2>
  </div>
  <div class="steps">
    <div class="step">
      <div class="step-num">01</div>
      <div class="step-content">
        <h3>Search for businesses</h3>
        <p>Enter any business type (plumber, dentist, web designer) and any location. We search Google Places live and return up to 60 matching businesses with phone numbers, addresses and ratings.</p>
      </div>
    </div>
    <div class="step">
      <div class="step-num">02</div>
      <div class="step-content">
        <h3>AI enriches the data</h3>
        <p>Click "Enrich All Leads" and our AI visits every business website automatically, extracting email addresses, owner names, and social media links. What used to take hours now takes seconds.</p>
      </div>
    </div>
    <div class="step">
      <div class="step-num">03</div>
      <div class="step-content">
        <h3>Export and reach out</h3>
        <p>Download your leads as a CSV file and import them into your CRM or email tool. Filter by email, phone, rating or website status to target exactly the right prospects.</p>
      </div>
    </div>
  </div>
</section>

