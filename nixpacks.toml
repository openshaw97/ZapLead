          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STATS -->
<div style="padding:0 20px;margin-bottom:100px">
  <div class="stats">
    <div class="stat"><span class="stat-num">60+</span><span class="stat-label">Leads per search</span></div>
    <div class="stat"><span class="stat-num">AI</span><span class="stat-label">Email extraction</span></div>
    <div class="stat"><span class="stat-num">195</span><span class="stat-label">Countries covered</span></div>
    <div class="stat"><span class="stat-num">CSV</span><span class="stat-label">Instant export</span></div>
  </div>
</div>

<!-- FEATURES -->
<section class="features" id="features">
  <div class="section-label">Features</div>
  <h2 class="section-title">Everything you need to<br/>find and close leads</h2>
  <div class="features-grid">
    <div class="feature-card">
      <div class="feature-icon">🔍</div>
      <h3>Search any business type</h3>
      <p>Search by business type and location across the UK and 195 countries. Get up to 60 results per search with full contact details.</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">🤖</div>
      <h3>AI email extraction</h3>
      <p>Our AI reads every business website and automatically extracts email addresses, owner names, and social media profiles.</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">📊</div>
      <h3>Export to CSV instantly</h3>
      <p>Download your leads as a clean CSV file with one click. Ready to import into any CRM, email tool or spreadsheet.</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">🎯</div>
