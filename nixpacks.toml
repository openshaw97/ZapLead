<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadHarvest — Find Business Leads Instantly</title>
<meta name="description" content="Find local business leads with emails, phone numbers and social profiles in seconds. Powered by AI. Try free for 7 days."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c10;--surface:#0f1318;--surface2:#161c24;
  --border:#1e2730;--border2:#2a3540;
  --green:#00e5a0;--green-dim:#00c488;--green-glow:rgba(0,229,160,0.12);
  --text:#e8edf2;--muted:#5a6875;--muted2:#8a97a4;
  --red:#ff4d6a;--amber:#ffb020;
}
html{scroll-behavior:smooth}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 60px;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,12,16,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05)}
@media(max-width:768px){nav{padding:16px 20px}}
.nav-logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--text);text-decoration:none}
.nav-logo span{color:var(--green)}
.nav-links{display:flex;align-items:center;gap:32px}
@media(max-width:768px){.nav-links .nav-link{display:none}}
.nav-link{color:var(--muted2);text-decoration:none;font-size:0.9rem;font-weight:500;transition:color 0.15s}
.nav-link:hover{color:var(--text)}
.nav-btns{display:flex;align-items:center;gap:12px}
.btn-ghost{color:var(--text);text-decoration:none;font-size:0.88rem;font-weight:500;padding:8px 18px;border-radius:6px;transition:all 0.15s}
.btn-ghost:hover{background:var(--surface2)}
.btn-cta{background:var(--green);color:var(--bg);text-decoration:none;font-size:0.88rem;font-weight:700;padding:9px 22px;border-radius:6px;transition:background 0.15s}
.btn-cta:hover{background:var(--green-dim)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 20px 60px;position:relative;overflow:hidden}
.hero-glow{position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(0,229,160,0.08) 0%,transparent 70%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--green-glow);border:1px solid rgba(0,229,160,0.25);color:var(--green);font-size:0.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:100px;margin-bottom:28px}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
h1{font-family:'Syne',sans-serif;font-size:clamp(2.8rem,7vw,5.5rem);font-weight:800;line-height:1.05;letter-spacing:-1px;margin-bottom:24px;max-width:800px}
h1 em{color:var(--green);font-style:normal;display:block}
.hero-sub{font-size:1.15rem;color:var(--muted2);line-height:1.7;max-width:520px;margin:0 auto 40px;font-weight:300}
.hero-sub strong{color:var(--text);font-weight:500}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:60px}
.btn-primary{background:var(--green);color:var(--bg);font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:0.5px;padding:16px 36px;border-radius:8px;text-decoration:none;transition:all 0.15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--green-dim);transform:translateY(-2px)}
.btn-secondary{background:transparent;color:var(--text);font-size:1rem;font-weight:500;padding:15px 32px;border-radius:8px;text-decoration:none;border:1px solid var(--border2);transition:all 0.15s}
.btn-secondary:hover{border-color:var(--green);color:var(--green)}
.hero-trust{display:flex;gap:32px;justify-content:center;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--muted2)}
.trust-icon{color:var(--green);font-size:1rem}

/* DEMO WIDGET */
.demo-section{padding:0 20px 100px;position:relative;z-index:1}
.demo-card{max-width:780px;margin:0 auto;background:var(--surface);border:1px solid var(--border2);border-radius:16px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
.demo-bar{background:var(--surface2);padding:14px 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.demo-dot{width:12px;height:12px;border-radius:50%}
.demo-url{flex:1;background:var(--bg);border-radius:6px;padding:6px 14px;font-size:0.78rem;color:var(--muted);font-family:monospace;margin:0 12px}
.demo-body{padding:24px}
.demo-search{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.demo-input{flex:1;min-width:140px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:0.88rem;padding:10px 14px;outline:none}
.demo-btn{background:var(--green);color:var(--bg);font-weight:700;font-size:0.88rem;padding:10px 22px;border:none;border-radius:6px;cursor:pointer;white-space:nowrap}
.demo-results{display:flex;flex-direction:column;gap:10px}
.demo-row{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:16px;animation:fadeIn 0.4s ease both}
.demo-row:nth-child(2){animation-delay:0.1s}
.demo-row:nth-child(3){animation-delay:0.2s}
.demo-avatar{width:38px;height:38px;border-radius:8px;background:var(--green-glow);border:1px solid rgba(0,229,160,0.2);display:grid;place-items:center;font-size:1.1rem;flex-shrink:0}
.demo-info{flex:1;min-width:0}
.demo-name{font-weight:600;font-size:0.9rem;margin-bottom:2px}
.demo-meta{font-size:0.75rem;color:var(--muted2)}
.demo-email{font-size:0.78rem;color:var(--green);display:flex;align-items:center;gap:4px}
.demo-stars{color:var(--amber);font-size:0.75rem}

/* STATS */
.stats{display:flex;justify-content:center;gap:0;max-width:900px;margin:0 auto 100px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
@media(max-width:600px){.stats{flex-direction:column}}
.stat{flex:1;text-align:center;padding:32px 20px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-num{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:var(--green);display:block;margin-bottom:6px}
.stat-label{font-size:0.83rem;color:var(--muted2)}

/* FEATURES */
.features{padding:0 20px 100px}
.section-label{font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;color:var(--green);font-weight:600;text-align:center;margin-bottom:12px}
.section-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;text-align:center;margin-bottom:60px;line-height:1.1}
.features-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px}
.feature-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;transition:border-color 0.2s,transform 0.2s}
.feature-card:hover{border-color:rgba(0,229,160,0.3);transform:translateY(-4px)}
.feature-icon{font-size:2rem;margin-bottom:16px}
.feature-card h3{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:10px}
.feature-card p{font-size:0.9rem;color:var(--muted2);line-height:1.65}

/* HOW IT WORKS */
.how{padding:0 20px 100px}
.steps{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:0}
.step{display:flex;gap:28px;padding:32px 0;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-num{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--green-glow);min-width:60px;line-height:1;color:rgba(0,229,160,0.15)}
.step-content h3{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:8px}
.step-content p{font-size:0.9rem;color:var(--muted2);line-height:1.65}

/* PRICING */
.pricing{padding:0 20px 100px}
.pricing-grid{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.price-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;position:relative}
.price-card.featured{border-color:var(--green);background:var(--green-glow)}
.price-popular{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--bg);font-size:0.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:4px 14px;border-radius:100px;white-space:nowrap}
.price-name{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:8px}
.price-amount{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;line-height:1;margin-bottom:4px}
.price-amount span{font-size:1rem;font-weight:400;color:var(--muted)}
.price-desc{font-size:0.82rem;color:var(--muted2);margin-bottom:24px}
.price-features{list-style:none;margin-bottom:28px;display:flex;flex-direction:column;gap:10px}
.price-features li{font-size:0.88rem;color:var(--muted2);display:flex;align-items:center;gap:8px}
.price-features li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}
.price-btn{display:block;text-align:center;background:var(--green);color:var(--bg);font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;padding:13px;border-radius:8px;text-decoration:none;transition:background 0.15s}
.price-btn:hover{background:var(--green-dim)}
.price-btn.outline{background:transparent;border:1px solid var(--border2);color:var(--text)}
.price-btn.outline:hover{border-color:var(--green);color:var(--green);background:transparent}

/* TESTIMONIALS */
.testimonials{padding:0 20px 100px}
.testimonials-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.testimonial{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px}
.testimonial-stars{color:var(--amber);font-size:0.9rem;margin-bottom:14px;letter-spacing:2px}
.testimonial-text{font-size:0.9rem;color:var(--muted2);line-height:1.7;margin-bottom:20px}
.testimonial-author{font-weight:600;font-size:0.88rem}
.testimonial-role{font-size:0.78rem;color:var(--muted)}

/* CTA */
.cta-section{padding:0 20px 100px}
.cta-box{max-width:700px;margin:0 auto;text-align:center;background:var(--green-glow);border:1px solid rgba(0,229,160,0.2);border-radius:16px;padding:60px 40px}
.cta-box h2{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;margin-bottom:14px}
.cta-box p{color:var(--muted2);font-size:1rem;margin-bottom:32px;line-height:1.6}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:48px 60px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px}
@media(max-width:768px){footer{padding:32px 20px;flex-direction:column;text-align:center}}
.footer-logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text)}
.footer-logo span{color:var(--green)}
.footer-links{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.footer-links a{color:var(--muted);text-decoration:none;font-size:0.85rem;transition:color 0.15s}
.footer-links a:hover{color:var(--text)}
.footer-copy{font-size:0.8rem;color:var(--muted)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">Lead<span>Harvest</span></a>
  <div class="nav-links">
    <a href="#features" class="nav-link">Features</a>
    <a href="#pricing" class="nav-link">Pricing</a>
    <a href="#how" class="nav-link">How it works</a>
  </div>
  <div class="nav-btns">
