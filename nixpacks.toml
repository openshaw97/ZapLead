      <p>Filter by rating, phone number, website presence and more. Find businesses with no website — perfect for web designers.</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">📱</div>
      <h3>Social profiles included</h3>
      <p>Get Facebook, Instagram, LinkedIn, Twitter and TikTok profiles alongside email and phone — everything you need to reach out.</p>
